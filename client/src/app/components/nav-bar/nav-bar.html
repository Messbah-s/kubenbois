<div class="flex justify-around">
  <button (click)="navigateToHome()"
          class="cursor-pointer inline-flex items-center gap-2 rounded-lg px-4 py-2 shadow transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 12l9-9 9 9M4 10v10a1 1 0 001 1h5m4 0h5a1 1 0 001-1V10"/>
    </svg>
    Home
  </button>
  @if (!loginState()) {
    <button (click)="navigateToLogin()"
            class="cursor-pointer inline-flex items-center gap-2 rounded-lg px-4 py-2 shadow transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z"/>
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M6 20c0-3.31 2.69-6 6-6s6 2.69 6 6"/>
      </svg>
      Sign in
    </button>
  } @else {
    <button (click)="navigateToLobby()"
            class="cursor-pointer inline-flex items-center gap-2 rounded-lg px-4 py-2 shadow transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M6 8h12a4 4 0 014 4v4a4 4 0 01-4 4h-1l-2-2h-6l-2 2H6a4 4 0 01-4-4v-4a4 4 0 014-4z"/>
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12h.01M7 14h.01M15 12h.01M17 14h.01"/>
      </svg>
      Jeux
    </button>
  }

  <button (click)="navigateToSettings()"
          class="cursor-pointer inline-flex items-center gap-2 rounded-lg px-4 py-2 shadow transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 3.924-1.756 4.35 0a1.724 1.724 0 002.591 1.163c1.524-.88 3.392.988 2.512 2.512a1.724 1.724 0 001.163 2.591c1.756.426 1.756 3.924 0 4.35a1.724 1.724 0 00-1.163 2.591c.88 1.524-.988 3.392-2.512 2.512a1.724 1.724 0 00-2.591 1.163c-.426 1.756-3.924 1.756-4.35 0a1.724 1.724 0 00-2.591-1.163c-1.524.88-3.392-.988-2.512-2.512a1.724 1.724 0 00-1.163-2.591c-1.756-.426-1.756-3.924 0-4.35a1.724 1.724 0 001.163-2.591c-.88-1.524.988-3.392 2.512-2.512.966.558 2.165.154 2.591-1.163z"/>
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
    Settings
  </button>
</div>
