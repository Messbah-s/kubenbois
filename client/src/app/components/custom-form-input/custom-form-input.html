<label class="input w-full"
       [ngClass]="{
        'input-error': hasError,
      }">
  @if (icon) {
    <img class="h-[1em] opacity-50" [src]="icon" alt="form icon">
  }
  <input
    [type]="type"
    [placeholder]="placeholder"
    [formControl]="inputForm"
    required
  />
</label>
@if (hasError) {
  <p class="mt-1 text-xs text-error whitespace-pre-line">
    {{ errorMessage }}
  </p>
}
