<div class="flex flex-col gap-5 items-center justify-center mt-5">
  <div class="flex flex-col h-[300px] w-custom-input-form gap-2">
    <p class="flex justify-center card-title w-full card border-2 border-orange-800 p-2">player turn</p>
    <p class="flex justify-center card-title h-full w-full card border-2 border-orange-800">{{ turnOrder()[0] }}</p>
    <div class="flex justify-between w-full gap-2">
      <button class="btn btn-primary flex-1" (click)="displayNextPlayer()" [disabled]="!(turnOrder().length - 1)">Next</button>
      <button class="btn btn-primary flex-1" (click)="ResetTurnOrder()" [disabled]="turnOrder().length > 1">New Turn</button>
    </div>
  </div>

  <div class="flex flex-col h-[300px] w-custom-input-form gap-2">
    <p class="flex justify-center card-title w-full card border-2 border-orange-800 p-2">played</p>
    @for (played of turnPlayed(); track played; let i = $index) {
      <p class="flex justify-center card-title h-full w-full card border-2 border-orange-800"
         [ngClass]="{'border-yellow-400': selectedCard === played}"
         (click)="selectCard(played, i)">
        {{ played }}</p>
    } @empty {
      <p class="flex justify-center card-title h-full w-full card border-2 border-orange-800"></p>
    }
    <div class="flex justify-between w-full">
      <button class="btn btn-primary flex-1" (click)="replayCard()" [disabled]="selectedCard === ''">Replay</button>
    </div>
  </div>
</div>
