<main class="h-full w-full p-6">
  <h1 class="text-3xl font-bold mb-6">🎲 Lobby des Jeux</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    @if (games$ | async; as games) {
      @for (game of games; track game.url) {
        <div class="card bg-base-200 shadow-xl">
          <figure class="px-10 pt-10">
            <img [src]="'game/' + game.image"
                 [alt]="game.titre"
                 class="rounded-xl w-32 h-32 object-contain"/>
          </figure>
          <div class="card-body items-center text-center">
            <h2 class="card-title">{{ game.titre }}</h2>
            <p>{{ game.description }}</p>
            <div class="card-actions mt-4">
              <button class="btn btn-primary"
                      (click)="openCreateGame(game)">
                Jouer
              </button>
            </div>
          </div>
        </div>
      }
    } @else {
      <div class="col-span-3 text-center text-gray-500">
        Chargement des jeux...
      </div>
    }
  </div>

  <app-create-game-modal
    #createGameModal
    [gameName]="'morpion'"
    [playerMini]="2"
    [playerMax]="6"
    (confirmed)="onGameConfirmed($event)">
  </app-create-game-modal>
</main>
